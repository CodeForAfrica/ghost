# This file should live in `/etc/nginx/conf.d/` or wherever your preferred flavour of Nginx expects to find config files.
#
# The central idea of this Nginx conf file is converting URLs containing non-ASCII characters into a format that Ghost understands
# and doing the corresponding redirects. This is necessitated by the fact that Ghost doesn't really have i18n support for URLs and slugs.
#
# Why do all this? So that we can handle Medium URLs on Ghost seamlessly.
#
# This means if a user visits
# https://pesacheck.org/partiellement-faux-le-gouvernement-sénégalais-na-pas-été-dissout-après-les-manifestations-du-19-5a7e55071173
# They get transparently redirected to
# https://pesacheck.org/partiellement-faux-le-gouvernement-s-c3-a9n-c3-a9galais-na-pas--c3-a9t-c3-a9-dissout-apr-c3-a8s-les-manifestations-du-19
# Which is the URL of the post within Ghost
#
# Example conversions:
#
# French
# partiellement-faux-le-gouvernement-sénégalais-na-pas-été-dissout-après-les-manifestations-du-19 ->
# partiellement-faux-le-gouvernement-s-c3-a9n-c3-a9galais-na-pas--c3-a9t-c3-a9-dissout-apr-c3-a8s-les-manifestations-du-19
#
# Amharic
# የፈጠራ-ወሬ-የየመን-ሚሳኤል-በእስራኤል-ላይ-ያደረሰውን-ጥቃት-ያሳይሉ-የተባሉት-እነዚህ-ሁለት-ፎቶዎች-የተቀነባበሩ-ናቸውi ->
# -e1-8b-a8-e1-8d-88-e1-8c-a0-e1-88-ab--e1-8b-88-e1-88-ac--e1-8b-a8-e1-8b-a8-e1-88-98-e1-8a-95--e1-88-9a-e1-88-b3-e1-8a-a4-e1-88-8d--e1-89-a0-e1-8a-a5-e1-88-b5-e1-88-ab-e1-8a-a4-e1-88-8d-
#
# English
# false-ugandas-education-minister-janet-museveni-has-not-ordered-schools-to-end-their-third-term ->
# false-ugandas-education-minister-janet-museveni-has-not-ordered-schools-to-end-their-third-term (No change as expected)
#


# Determine if the URL needs conversion by checking if it contains non-ASCII characters.
map $uri $needs_conversion {
    ~[^\x00-\x7F] "yes";
    default        "no";
}

# Origin micro-cache. Sits in front of Ghost to absorb traffic spikes so the DB connection pool (60) is never exhausted. Mirrors the production config
# in nginx.conf.sigil — keep them in sync.
proxy_cache_path /var/cache/nginx/ghost levels=1:2 keys_zone=ghost:50m
                 max_size=2g inactive=1h use_temp_path=off;

# Bypass cache entirely for logged-in members and Ghost admin/staff. Both proxy_cache_bypass and proxy_no_cache must reference these — setting only
# one leaks personalized responses to anonymous visitors.
map $http_cookie $ghost_bypass_cookie {
    default                       0;
    "~*ghost-members"             1;
    "~*ghost-admin-api-session"   1;
}

map $request_method $ghost_bypass_method {
    default 0;
    POST    1;
    PUT     1;
    PATCH   1;
    DELETE  1;
}

map $request_uri $ghost_bypass_path {
    default              0;
    "~^/ghost/"          1;
    "~^/members/api/"    1;
    "~^/members/auth/"   1;
}

# Set up a JSON log format for better structured logging.
log_format json escape=json
  '{'
    '"timestamp": "$time_iso8601",'
    '"client_ip": "$remote_addr",'
    '"request_id": "$request_id",'
    '"http_method": "$request_method",'
    '"http_path": "$uri",'
    '"protocol": "$server_protocol",'
    '"user_agent": "$http_user_agent",'
    '"referer": "$http_referer",'
    '"status_code": $status,'
    '"bytes_sent": $body_bytes_sent,'
    '"request_time_secs": $request_time'
  '}';

server {
    listen 8069;
    server_name localhost;

    access_log logs/access.log json;
    error_log logs/error.log;

    client_max_body_size 100M;

    # gzip — server-context so every location inherits. gzip_proxied any is required because nginx's default skips gzip on proxy_pass'd
    # responses, and everything here is proxied to Ghost. Mirrors the production block in nginx.conf.sigil.
    gzip on;
    gzip_proxied any;
    gzip_min_length 1100;
    gzip_buffers 4 32k;
    gzip_types text/css text/javascript text/xml text/plain text/x-component
               application/javascript application/x-javascript application/json
               application/xml application/rss+xml application/atom+xml
               font/truetype application/x-font-ttf font/opentype
               application/vnd.ms-fontobject image/svg+xml;
    gzip_vary on;
    gzip_comp_level 6;

    # Remove the random ID that Medium appends to post URLs. This effectively does the same redirect recommended by Ghost here:
    # https://docs.ghost.org/migration/medium#using-custom-domains
    rewrite "^/(.*)(-[0-9a-f]{10,12})$" /$1 permanent;

    # Sitemap routes: 1h TTL because search crawlers tolerate hours of staleness. Mirrors the production block in nginx.conf.sigil. Matches
    # /sitemap.xml plus the five sub-sitemaps Ghost emits.
    location ~* ^/sitemap(-[a-z]+)?\.xml$ {
        proxy_pass http://ghost:2368;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_cache         ghost;
        proxy_cache_key     "$scheme$host$request_uri";
        proxy_cache_valid   200 301 302  1h;
        proxy_cache_valid   404           5m;
        # Ghost sends Cache-Control: max-age=0 on sitemaps, which would override proxy_cache_valid. Tell Nginx to honour our TTL instead.
        proxy_ignore_headers Cache-Control Expires X-Accel-Expires;

        proxy_cache_lock              on;
        proxy_cache_lock_timeout      5s;
        proxy_cache_lock_age          10s;
        proxy_cache_use_stale         updating error timeout
                                      http_500 http_502 http_503 http_504;
        proxy_cache_background_update on;

        proxy_cache_bypass  $ghost_bypass_method;
        proxy_no_cache      $ghost_bypass_method;

        add_header X-Cache-Status $upstream_cache_status always;
    }

    # Feed routes: longer TTL because RSS readers poll on a schedule and tolerate minutes of staleness. Mirrors the production block in
    # nginx.conf.sigil — keep them in sync. Regex location wins over `location /`, so the Lua URL rewriter is skipped (safe: feed paths
    # are ASCII and carry no Medium-ID suffixes).
    location ~* ^/(rss|feed)(/|$|\.xml$) {
        proxy_pass http://ghost:2368;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_cache         ghost;
        proxy_cache_key     "$scheme$host$request_uri";
        proxy_cache_valid   200 301 302  10m;
        proxy_cache_valid   404           1m;
        # Ghost sends Cache-Control: max-age=0 on feeds and xml, which would override proxy_cache_valid. Tell Nginx to honour our TTL instead.
        proxy_ignore_headers Cache-Control Expires X-Accel-Expires;

        proxy_cache_lock              on;
        proxy_cache_lock_timeout      5s;
        proxy_cache_lock_age          10s;
        proxy_cache_use_stale         updating error timeout
                                      http_500 http_502 http_503 http_504;
        proxy_cache_background_update on;

        proxy_cache_bypass  $ghost_bypass_cookie $ghost_bypass_method;
        proxy_no_cache      $ghost_bypass_cookie $ghost_bypass_method;

        add_header X-Cache-Status $upstream_cache_status always;
    }

    # Static assets: trust upstream Cache-Control (Ghost sends 30 days on these) instead of overriding to our short HTML TTL. Mirrors the
    # production block in nginx.conf.sigil — keep them in sync. Excludes /content/files since those may be member-gated.
    location ~* ^/(content/images|assets|public)/ {
        proxy_pass http://ghost:2368;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_cache         ghost;
        proxy_cache_key     "$scheme$host$request_uri";
        # No proxy_ignore_headers — let upstream Cache-Control drive TTL.
        # Fallback if upstream sends no Cache-Control: 1h.
        proxy_cache_valid   200 301 302  1h;
        proxy_cache_valid   404           1m;

        proxy_cache_lock              on;
        proxy_cache_lock_timeout      5s;
        proxy_cache_lock_age          10s;
        proxy_cache_use_stale         updating error timeout
                                      http_500 http_502 http_503 http_504;
        proxy_cache_background_update on;

        proxy_cache_bypass  $ghost_bypass_method;
        proxy_no_cache      $ghost_bypass_method;

        add_header X-Cache-Status $upstream_cache_status always;
    }

    location / {
        # Check if conversion is needed using the map
        access_by_lua_block {
            -- First check for Medium ID and remove it before processing
            local has_medium_id = string.match(ngx.var.uri, "/(.*)-([%x][%x][%x][%x][%x][%x][%x][%x][%x][%x][%x]?[%x]?)$")
            if has_medium_id then
                -- Remove Medium ID
                local clean_path = string.gsub(ngx.var.uri, "/(.*)-([%x][%x][%x][%x][%x][%x][%x][%x][%x][%x][%x]?[%x]?)$", "/%1")
                -- Permanent redirect since the Medium ID doesn't mean much on any other platform
                ngx.redirect(clean_path, 301)
                return
            end

            if ngx.var.needs_conversion == "yes" then
              local function convert_string(input_str)
                  -- Split the input string by hyphens
                  local parts = {}
                  for part in string.gmatch(input_str, "([^%-]+)") do
                      table.insert(parts, part)
                  end

                  -- Process each part (same as above)
                  local encoded_parts = {}
                  for i, part in ipairs(parts) do
                      -- Convert part to UTF-8 byte sequence and encode
                      local encoded = ""
                      for j = 1, #part do
                          local byte = string.byte(part, j)
                          if byte < 128 and string.match(string.char(byte), "[%w%-_.~]") then
                              -- Keep safe ASCII characters as is
                              encoded = encoded .. string.char(byte)
                          else
                              -- For all other bytes except the first one, use the -XX format
                              if #encoded > 0 then
                                  encoded = encoded .. "-" .. string.format("%02x", byte):lower()
                              else
                                  encoded = encoded .. string.format("%02x", byte):lower()
                              end
                          end
                      end
                      table.insert(encoded_parts, encoded)
                  end

                  -- Join all parts back with hyphens
                  local result = table.concat(encoded_parts, "-")

                  -- Truncate the URL at 185 characters in case it is longer to match what Ghost expects
                  if #result > 185 then
                      result = string.sub(result, 1, 185)
                  end

                  return result
              end

                  -- Remove leading slash for processing
                  local original_path = ngx.var.uri
                  if string.sub(original_path, 1, 1) == "/" then
                      original_path = string.sub(original_path, 2, -1)
                  end

                  local converted_path = convert_string(original_path)

                  -- Redirect to the converted path
                  -- Only do a temporary redirect allowing us to revert to ASCII URLs in future
                  ngx.redirect("/" .. converted_path, 307)
                  return
            end
        }

        # Handle normal requests that don't need conversion
        proxy_pass http://ghost:2368;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # ---- Origin micro-cache --------------------------------------------
        # Trio that prevents the thundering herd: cache_lock collapses concurrent cold misses to one upstream request; use_stale updating
        # + background_update means TTL expiry on a hot key triggers ONE async refresh while everyone else gets stale instantly.
        proxy_cache         ghost;
        proxy_cache_key     "$scheme$host$request_uri";
        proxy_cache_valid   200 301 302  30s;
        proxy_cache_valid   404           10s;
        proxy_ignore_headers Cache-Control Expires X-Accel-Expires;

        proxy_cache_lock              on;
        proxy_cache_lock_timeout      5s;
        proxy_cache_lock_age          10s;

        proxy_cache_use_stale         updating error timeout
                                      http_500 http_502 http_503 http_504;
        proxy_cache_background_update on;

        # Logged-in / mutating / admin: never serve, never store.
        proxy_cache_bypass  $ghost_bypass_cookie $ghost_bypass_method $ghost_bypass_path;
        proxy_no_cache      $ghost_bypass_cookie $ghost_bypass_method $ghost_bypass_path;

        add_header X-Cache-Status $upstream_cache_status always;
    }
}
